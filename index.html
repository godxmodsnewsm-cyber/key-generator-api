<!DOCTYPE html>
<html>
<head>
    <title>GODXMODS KEY</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">

            <style>
                    body {

                                            color: white;
                                                        font-family: Arial;

                                                                            }

                                                                                    .box {

                                                                                                                                                        }

                                                                                                                                                                img {
                                                                                                                                                                            width: 120px;
                                                                                                                                                                                    }

                                                                                                                                                                                            .info {
                                                                                                                                                                                                        background: #222;
                                                                                                                                                                                                                    padding: 12px;
                                                                                                                                                                                                                                margin: 10px;
                                                                                                                                                                                                                                            border-radius: 10px;
                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                            button {
                                                                                                                                                                                                                                                                        width: 90%;
                                                                                                                                                                                                                                                                                    padding: 15px;
                                                                                                                                                                                                                                                                                                margin: 10px;
                                                                                                                                                                                                                                                                                                            border: none;
                                                                                                                                                                                                                                                                                                                        border-radius: 10px;

                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                            #key {
                                                                                                                                                                                                                                                                                                                                                                                        color: lime;
                                                                                                                                                                                                                                                                                                                                                                                                    font-size: 18px;
                                                                                                                                                                                                                                                                                                                                                                                                                margin-top: 20px;
                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                            </style>
                                                                                                                                                                                                                                                                                                                                                                                                                            </head>

                                                                                                                                                                                                                                                                                                                                                                                                                            <body>

                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="box">

                                                                                                                                                                                                                                                                                                                                                                                                                                <img src="https://i.supaimg.com/8bbbe2d4-c7db-47de-9ede-7d1cafa9fcbe/a57051df-40f7-4b8d-ad1e-314eb50e1679.jpg">

                                                                                                                                                                                                                                                                                                                                                                                                                                    <h2>GODXMODS NEW & SANDIP KEY GENERATE</h2>

                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="info">Game: GODXMODS S.M Free Fire</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="info">Status: 1 Device</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="info">Validity: 1 Hour</div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                    <button onclick="getKey()">GENERATE KEY</button>

                                                                                                                                                                                                                                                                                                                                                                                                                                                        <button onclick="window.open('https://youtube.com/@godxmouds-ug1qe')">YOUTUBE</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button onclick="window.open('https://t.me/e542k')">JOIN TELEGRAM</button>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                <script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                async function getKey() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById("key").innerText = "Loading...";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                        try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                let res = await fetch("https://key-generator-api.vercel.app/api/generate", {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            method: "POST",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        headers: {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        "Content-Type": "application/json"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    let data = await res.json();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (data.key) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById("key").innerText = "KEY: " + data.key;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById("key").innerText = "Error loading key!";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        } catch (err) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById("key").innerText = "Server error ❌";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        console.log(err);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </html>
